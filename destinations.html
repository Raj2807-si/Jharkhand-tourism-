<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | Jharkhand Tourism</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            background: linear-gradient(rgba(15, 20, 15, 0.8), rgba(15, 20, 15, 0.9)), url('https://images.unsplash.com/photo-1544605963-356fd480e661?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            padding: 8rem 0 4rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .filter-btn {
            border-radius: 50px;
            opacity: 0.8;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            opacity: 1;
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top" id="navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-leaf text-success me-2"></i>Jharkhand<span>Tourism</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="destinations.html">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="planner.html">Trip Planner</a></li>
                    <li class="nav-item"><a class="nav-link" href="culture.html">Culture</a></li>
                </ul>
                <div class="d-flex gap-2 auth-buttons">
                    <a href="login.html" class="btn btn-secondary btn-sm">Login</a>
                    <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="page-header text-white">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">Explore Destinations</h1>
            <p class="lead text-light opacity-75 mx-auto" style="max-width: 600px;">Waterfalls, Hills, Heritage & More.
            </p>
        </div>
    </header>

    <section class="container py-4">
        <!-- Filter Buttons -->
        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
            <button class="btn btn-outline-light filter-btn active" onclick="renderDestinations('all')">All</button>
            <button class="btn btn-outline-light filter-btn" onclick="renderDestinations('city')">Cities</button>
            <button class="btn btn-outline-light filter-btn"
                onclick="renderDestinations('waterfall')">Waterfalls</button>
            <button class="btn btn-outline-light filter-btn" onclick="renderDestinations('hill')">Hill Stations</button>
            <button class="btn btn-outline-light filter-btn" onclick="renderDestinations('wildlife')">Wildlife</button>
            <button class="btn btn-outline-light filter-btn"
                onclick="renderDestinations('spiritual')">Spiritual</button>
            <button class="btn btn-outline-light filter-btn" onclick="renderDestinations('heritage')">Heritage</button>
            <button class="btn btn-outline-light filter-btn" onclick="renderDestinations('lake')">Lakes & Dams</button>
            <button class="btn btn-outline-light filter-btn"
                onclick="renderDestinations('adventure')">Adventure</button>
            <button class="btn btn-outline-light filter-btn" onclick="renderDestinations('hospital')">Hospitals</button>
            <button class="btn btn-outline-light filter-btn" onclick="renderDestinations('hidden')">Hidden Gems</button>
        </div>

        <!-- Hospital Selector (Hidden by default) -->
        <div id="hospital-selector" class="d-none justify-content-center mb-5 fade-in">
            <div class="input-group" style="max-width: 400px;">
                <label class="input-group-text bg-secondary text-white border-secondary" for="hospitalSelect">Select
                    Hospital</label>
                <select class="form-select bg-dark text-white border-secondary" id="hospitalSelect"
                    onchange="if(this.value) showDetails(this.value, 'hospital')">
                    <option value="" selected>Choose a hospital...</option>
                </select>
            </div>
        </div>

        <!-- Grid -->
        <div class="row g-4" id="destinations-grid">
            <!-- Content Injected by JS -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-4 mt-5 border-top border-secondary">
        <div class="container text-center text-muted">
            <p>&copy; 2024 Jharkhand Tourism Management System. All rights reserved.</p>
        </div>
    </footer>

    <!-- Details Modal -->
    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content"
                style="background: #1a201a; border: 1px solid rgba(255,255,255,0.1); color: #fff;">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle">Destination Name</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <img id="modalImage" src="" class="img-fluid rounded mb-3"
                        style="width: 100%; height: 200px; object-fit: cover;">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="badge bg-success" id="modalCategory">Category</span>
                        <small class="text-warning"><i class="fa-solid fa-location-dot me-1"></i><span
                                id="modalLocation">Location</span></small>
                    </div>
                    <p class="text-light opacity-75" id="modalDesc">Description goes here...</p>
                    <hr class="border-secondary">
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" onclick="window.location.href='planner.html'">Add to Trip
                            Plan</button>
                        <a id="modalMapBtn" href="#" target="_blank" class="btn btn-outline-success"><i
                                class="fa-solid fa-map-location-dot me-2"></i>View on Google Maps</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/destinations.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Init
        document.addEventListener('DOMContentLoaded', () => {
            renderDestinations('all');

            // Check for 'name' query param to open specific details
            const urlParams = new URLSearchParams(window.location.search);
            const name = urlParams.get('name');
            if (name) {
                // Small timeout to ensure DOM is ready and modal logic works
                setTimeout(() => showDetails(name), 100);
            }
        });

        function renderDestinations(filter) {
            const grid = document.getElementById('destinations-grid');
            grid.innerHTML = ''; // Clear

            // Update active button
            if (event) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            let filtered = destinationsData;
            const hospitalSelector = document.getElementById('hospital-selector');
            const hospitalSelect = document.getElementById('hospitalSelect');

            if (filter !== 'all') {
                filtered = destinationsData.filter(item => item.category === filter);
            }

            // Show/Hide Hospital Selector
            if (filter === 'hospital') {
                hospitalSelector.classList.remove('d-none');
                hospitalSelector.classList.add('d-flex');

                // Populate Dropdown
                hospitalSelect.innerHTML = '<option value="" selected>Choose a hospital...</option>';
                filtered.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.name;
                    option.textContent = item.name;
                    hospitalSelect.appendChild(option);
                });
            } else {
                hospitalSelector.classList.add('d-none');
                hospitalSelector.classList.remove('d-flex');
            }

            filtered.forEach(item => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4';
                const imgUrl = item.image || getPlaceholderImage(item.category);

                // Store data stringified in data attribute for easy access
                // But better to just pass name to function and look it up

                col.innerHTML = `
                    <div class="card h-100 shadow-sm border-0">
                        <div class="position-relative">
                            <img src="${imgUrl}" class="card-img-top" alt="${item.name}" style="height: 250px; object-fit: cover;">
                            <span class="card-tag text-uppercase">${item.category}</span>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h3 class="h4 card-title">${item.name}</h3>
                            <p class="card-text text-muted mb-3"><i class="fa-solid fa-location-dot me-2 text-success"></i>${item.location}</p>
                            <p class="small text-white-50 flex-grow-1">${item.description}</p>
                            <button class="btn btn-secondary w-100 mt-auto" onclick="showDetails('${item.name}', '${item.category}')">View Details</button>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function showDetails(name, category) {
            // Find item by name AND category to handle duplicate names (e.g., Ranchi as City and Hospital)
            let item;
            if (category) {
                item = destinationsData.find(d => d.name === name && d.category === category);
            }
            // Fallback for query param call or legacy
            if (!item) {
                item = destinationsData.find(d => d.name === name);
            }

            if (!item) return;

            document.getElementById('modalTitle').innerText = item.name;
            document.getElementById('modalImage').src = item.detailsImage || item.image || getPlaceholderImage(item.category);
            document.getElementById('modalLocation').innerText = item.location;
            document.getElementById('modalCategory').innerText = item.category;
            document.getElementById('modalDesc').innerText = item.description;

            // Set Map Link
            const mapQuery = encodeURIComponent(item.name + ' ' + item.location + ' Jharkhand');
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${mapQuery}`;
            document.getElementById('modalMapBtn').href = mapUrl;

            new bootstrap.Modal(document.getElementById('detailsModal')).show();
        }

        // Fix for initial load active button not working because event is undefined
        // Actually, I can just leave standard onclick in HTML
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Jharkhand Tourism</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="auth-card">
                        <div class="text-center mb-4">
                            <a href="index.html" class="text-decoration-none text-white fs-4 fw-bold">
                                <i class="fa-solid fa-leaf text-success"></i> Jharkhand<span
                                    class="text-success">Tourism</span>
                            </a>
                            <h2 class="mt-3">Create Account</h2>
                            <p class="text-muted">Join the journey</p>
                        </div>

                        <form onsubmit="registerUser(event)">
                            <div class="mb-3">
                                <label class="form-label text-light">Full Name</label>
                                <input type="text" id="reg-name"
                                    class="form-control bg-transparent text-light border-secondary"
                                    placeholder="Raj Sinha" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-light">Email Address</label>
                                <input type="email" id="reg-email"
                                    class="form-control bg-transparent text-light border-secondary"
                                    placeholder="john@example.com" required>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label text-light">Password</label>
                                    <input type="password" id="reg-password"
                                        class="form-control bg-transparent text-light border-secondary" required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label text-light">Confirm</label>
                                    <input type="password" id="reg-confirm-password"
                                        class="form-control bg-transparent text-light border-secondary" required>
                                </div>
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input bg-transparent border-secondary" type="checkbox"
                                    id="terms" required>
                                <label class="form-check-label text-muted small" for="terms">
                                    I agree to the Terms & Conditions
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-2">Register</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small">Already have an account? <a href="login.html"
                                    class="text-success text-decoration-none">Log In</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>

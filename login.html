<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jharkhand Tourism</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .role-btn {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .role-btn.active {
            opacity: 1;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
        }
    </style>
</head>

<body>

    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="auth-card">
                        <div class="text-center mb-4">
                            <a href="index.html" class="text-decoration-none text-white fs-4 fw-bold">
                                <i class="fa-solid fa-leaf text-success"></i> Jharkhand<span
                                    class="text-success">Tourism</span>
                            </a>
                            <h2 class="mt-3">Welcome Back</h2>
                            <p class="text-muted">Log in to your account</p>
                        </div>

                        <!-- Role Switcher -->
                        <div class="d-flex justify-content-center gap-4 mb-4 border-bottom border-secondary pb-2">
                            <div class="role-btn active" onclick="switchRole(event, 'visitor')">Visitor</div>
                            <div class="role-btn" onclick="switchRole(event, 'admin')">Admin</div>
                        </div>

                        <form onsubmit="loginUser(event)">
                            <div class="mb-3">
                                <label class="form-label text-light">Email Address</label>
                                <input type="email" id="login-email"
                                    class="form-control bg-transparent text-light border-secondary"
                                    placeholder="john@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-light">Password</label>
                                <input type="password" id="login-password"
                                    class="form-control bg-transparent text-light border-secondary"
                                    placeholder="••••••••" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-3">Log In</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small">Don't have an account? <a href="register.html"
                                    class="text-success text-decoration-none">Sign Up</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function switchRole(event, role) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (role === 'admin') {
                // Mock behavior: in real app this might change the form action
            }
        }
    </script>
</body>

</html>
